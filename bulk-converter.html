    <main class="tool-page">
        <div class="container">
            <div class="tool-hero">
                <h1><i class="fas fa-images" style="color:var(--primary);"></i> Bulk Image Converter</h1>

            <div class="tool-workspace">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-icon"><i class="fas fa-cloud-upload-alt"></i></div>

                        <button class="btn btn-primary" onclick="bulkConvert()"><i class="fas fa-magic"></i> Convert
                            All</button>
                    </div>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="result-area" id="resultArea">
                    <i class="fas fa-check-circle"></i>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
    <script>
        const { jsPDF } = window.jspdf;
        let images = [];
        initDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), handleFiles);

        function handleFiles(fl) {
            Array.from(fl).forEach(f => {
                if (!f.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => { images.push({ name: f.name, size: f.size, dataUrl: e.target.result, w: img.width, h: img.height }); render(); };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(f);
            });
        }
        function render() {
            document.getElementById('fileList').innerHTML = images.map((m, i) => `
        <div class="file-item">
          <img src="${m.dataUrl}" class="file-item-thumb">
          <div class="file-item-info"><div class="file-item-name">${escapeHTML(m.name)}</div><div class="file-item-size">${formatBytes(m.size)}</div></div>
          <div class="file-item-remove" onclick="images.splice(${i},1);render()"><i class="fas fa-times"></i></div>
        </div>`).join('');
            document.getElementById('fileCount').textContent = images.length ? `${images.length} file(s)` : 'No files selected';
        }
        function clearAll() { images = []; render(); document.getElementById('resultArea').classList.remove('show'); }

        async function bulkConvert() {
            if (!images.length) return showToast('Add images first.', 'error');
            const pb = document.getElementById('progressBar'), pf = document.getElementById('progressFill');
            pb.classList.add('active'); pf.style.width = '0%';
            const links = document.getElementById('downloadLinks');
            links.innerHTML = '';
            const blobs = [];
            for (let i = 0; i < images.length; i++) {
                const m = images[i];
                const orient = m.w > m.h ? 'landscape' : 'portrait';
                const pdf = new jsPDF({ orientation: orient, unit: 'px', format: [m.w, m.h] });
                const t = m.name.toLowerCase().endsWith('.png') ? 'PNG' : 'JPEG';
                pdf.addImage(m.dataUrl, t, 0, 0, m.w, m.h);
                const blob = pdf.output('blob');
                const pdfName = m.name.replace(/\.[^.]+$/, '') + '.pdf';
                blobs.push({ blob, name: pdfName });
                pf.style.width = ((i + 1) / images.length * 100) + '%';
                await new Promise(r => setTimeout(r, 30));
            }
            blobs.forEach(b => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-outline btn-sm';
                btn.style.margin = '4px';
                btn.innerHTML = `<i class="fas fa-download"></i> ${b.name}`;
                btn.onclick = () => { downloadBlob(b.blob, b.name); FreePDFStats.record('Bulk Converter'); };
                links.appendChild(btn);
            });
            document.getElementById('resultInfo').textContent = `${blobs.length} PDF(s) created`;
            document.getElementById('resultArea').classList.add('show');
            showToast(`${blobs.length} PDFs created!`, 'success');
            setTimeout(() => pb.classList.remove('active'), 400);
        }
    </script>
