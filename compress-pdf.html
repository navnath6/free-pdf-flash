    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="app.js"></script>
    <script>
        let srcBytes = null, origSize = 0, fileName = '';
        initDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), handleFile);

        function handleFile(fl) {
            const f = fl[0]; if (!f) return;
            fileName = f.name; origSize = f.size;
            const reader = new FileReader();
            reader.onload = e => {
                srcBytes = new Uint8Array(e.target.result);
                document.getElementById('fName').textContent = f.name;
                document.getElementById('fSize').textContent = formatBytes(f.size);
                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('actionBar').style.display = 'flex';
            };
            reader.readAsArrayBuffer(f);
        }

        async function compressPDF() {
            if (!srcBytes) return;
            const pb = document.getElementById('progressBar'), pf = document.getElementById('progressFill');
            pb.classList.add('active'); pf.style.width = '10%';
            const level = document.getElementById('compLevel').value;
            try {
                const pdf = await PDFLib.PDFDocument.load(srcBytes, { ignoreEncryption: true });
                pf.style.width = '40%';

                /* Client-side compression strategy:
                   - Remove metadata/info dictionary
                   - Re-serialize with object compression (pdf-lib does UseObjectStreams) */
                if (level === 'high' || level === 'medium') {
                    pdf.setTitle('');
                    pdf.setAuthor('');
                    pdf.setSubject('');
                    pdf.setKeywords([]);
                    pdf.setProducer('Free PDF Flash');
                    pdf.setCreator('Free PDF Flash');
                }
                pf.style.width = '70%';

                const opts = {};
                if (level === 'high') {
                    opts.useObjectStreams = true;
                    opts.addDefaultPage = false;
                }

                const compressedBytes = await pdf.save(opts);
                pf.style.width = '100%';

                const newSize = compressedBytes.byteLength;
                const saved = origSize - newSize;
                const pct = ((saved / origSize) * 100).toFixed(1);
                const blob = new Blob([compressedBytes], { type: 'application/pdf' });

                document.getElementById('resultInfo').innerHTML =
                    `Original: <strong>${formatBytes(origSize)}</strong> → Compressed: <strong>${formatBytes(newSize)}</strong><br>` +
                    (saved > 0 ? `Saved <strong>${formatBytes(saved)}</strong> (${pct}% reduction)` : `File was already optimized.`);
                document.getElementById('resultArea').classList.add('show');
                document.getElementById('downloadBtn').onclick = () => {
                    downloadBlob(blob, 'compressed-' + fileName);
                    FreePDFStats.record('Compress PDF');
                };
                showToast('Compression complete!', 'success');
            } catch (err) { showToast('Error: ' + err.message, 'error'); }
            setTimeout(() => pb.classList.remove('active'), 400);
        }
    </script>
