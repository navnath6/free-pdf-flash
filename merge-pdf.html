    <main class="tool-page">
        <div class="container">
            <div class="tool-hero">
                <h1><i class="fas fa-object-group" style="color:var(--primary);"></i> Merge PDF</h1>
                <p>Combine multiple PDF files into one document. Drag to reorder.</p>
            </div>
            <div class="tool-workspace">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                    <h3>Drag &amp; drop PDF files here</h3>
                    <p>or click to browse</p>
                    <input type="file" id="fileInput" multiple accept=".pdf" hidden>
                </div>
                <div class="file-list" id="fileList"></div>
                <div class="action-bar">
                    <span class="file-count" id="fileCount">No files selected</span>

                        <button class="btn btn-outline btn-sm" onclick="clearAll()"><i class="fas fa-trash"></i>

                        <button class="btn btn-primary" onclick="mergePDFs()"><i class="fas fa-object-group"></i> Merge
                            PDFs</button>
                    </div>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="result-area" id="resultArea">
                    <i class="fas fa-check-circle"></i>
                    <h3>PDFs Merged Successfully!</h3>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="app.js"></script>
    <script>
        let pdfFiles = [];
        let mergedBlob = null;
        initDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), handleFiles);

        function handleFiles(fl) {
            Array.from(fl).forEach(f => {
                if (f.type !== 'application/pdf' && !f.name.endsWith('.pdf')) return;
                pdfFiles.push({ name: f.name, size: f.size, file: f });
                render();
            });
        }
        function render() {
            const list = document.getElementById('fileList');
            list.innerHTML = pdfFiles.map((p, i) => `
        <div class="file-item" draggable="true" data-index="${i}">
          <div class="file-item-thumb" style="display:flex;align-items:center;justify-content:center;background:var(--bg-surface);color:var(--primary);font-size:1.2rem;"><i class="fas fa-file-pdf"></i></div>
          <div class="file-item-info"><div class="file-item-name">${escapeHTML(p.name)}</div><div class="file-item-size">${formatBytes(p.size)}</div></div>
          <div class="file-item-remove" onclick="pdfFiles.splice(${i},1);render()"><i class="fas fa-times"></i></div>
        </div>`).join('');
            document.getElementById('fileCount').textContent = pdfFiles.length ? `${pdfFiles.length} file(s)` : 'No files selected';
            initSortable(list);
            list.addEventListener('dragend', () => {
                const items = list.querySelectorAll('.file-item');
                const newOrder = [];
                items.forEach(item => newOrder.push(pdfFiles[parseInt(item.dataset.index)]));
                pdfFiles = newOrder;
                render();
            });
        }
        function clearAll() { pdfFiles = []; render(); document.getElementById('resultArea').classList.remove('show'); }

        async function mergePDFs() {
            if (pdfFiles.length < 2) return showToast('Please add at least 2 PDF files.', 'error');
            const pb = document.getElementById('progressBar'), pf = document.getElementById('progressFill');
            pb.classList.add('active'); pf.style.width = '0%';
            try {
                const merged = await PDFLib.PDFDocument.create();
                for (let i = 0; i < pdfFiles.length; i++) {
                    const bytes = await pdfFiles[i].file.arrayBuffer();
                    const src = await PDFLib.PDFDocument.load(bytes);
                    const pages = await merged.copyPages(src, src.getPageIndices());
                    pages.forEach(p => merged.addPage(p));
                    pf.style.width = ((i + 1) / pdfFiles.length * 100) + '%';
                }
                const pdfBytes = await merged.save();
                mergedBlob = new Blob([pdfBytes], { type: 'application/pdf' });
                const totalPages = merged.getPageCount();
                document.getElementById('resultInfo').textContent = `${totalPages} pages · ${formatBytes(mergedBlob.size)}`;
                document.getElementById('resultArea').classList.add('show');
                document.getElementById('downloadBtn').onclick = () => { downloadBlob(mergedBlob, 'merged.pdf'); FreePDFStats.record('Merge PDF'); };
                showToast('PDFs merged!', 'success');
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
            setTimeout(() => pb.classList.remove('active'), 400);
        }
    </script>
