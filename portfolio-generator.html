    <main class="tool-page">
        <div class="container">
            <div class="tool-hero">
                <h1><i class="fas fa-briefcase" style="color:var(--primary);"></i> Portfolio PDF Generator</h1>
                <p>Combine your work images and descriptions into a polished portfolio PDF.</p>
            </div>
            <div class="tool-workspace">
                <h3 style="margin-bottom:16px;font-size:1rem;">Portfolio Details</h3>
                <div class="form-grid">
                    <div class="form-group"><label>Your Name</label><input type="text" id="pName"

                    <div class="form-group"><label>Title / Tagline</label><input type="text" id="pTagline"
                            placeholder="Graphic Designer & Illustrator"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="pEmail"

                </div>
                <div class="form-group"><label>Introduction</label><textarea id="pIntro" rows="3"
                        placeholder="Brief introduction about you and your work..."></textarea></div>

                <h3 style="margin:24px 0 16px;font-size:1rem;">Portfolio Items</h3>
                <div id="itemList"></div>
                <button class="btn btn-outline btn-sm" onclick="addItem()" style="margin-top:8px;"><i
                        class="fas fa-plus"></i> Add Item</button>

                <div class="settings-panel" style="margin-top:24px;">
                    <div class="setting-group">

                        </select>

                        <label for="pLayout">Layout</label>

                        </select>
                    </div>

                <div class="action-bar">
                    <span></span>
                    <button class="btn btn-primary" onclick="generatePortfolio()"><i class="fas fa-file-pdf"></i>
                        Generate Portfolio PDF</button>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>

                    <i class="fas fa-check-circle"></i>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
    <script>
        const { jsPDF } = window.jspdf;
        let itemCount = 0;
        const items = [];

        window.addEventListener('DOMContentLoaded', () => { addItem(); addItem(); });

        function addItem() {
            const id = itemCount++;
            const div = document.createElement('div');
            div.className = 'form-grid';
            div.style.cssText = 'margin-bottom:12px;padding:16px;background:var(--bg-surface);border-radius:var(--radius-md);';
            div.dataset.id = id;
            div.innerHTML = `
        <div class="form-group"><label>Project Title</label><input type="text" class="item-title" placeholder="Project Name"></div>
        <div class="form-group"><label>Description</label><textarea class="item-desc" rows="2" placeholder="Brief description..."></textarea></div>
        <div class="form-group" style="grid-column:1/-1;">
          <label>Image</label>
          <input type="file" class="item-image" accept="image/*" onchange="previewItemImage(this, ${id})">
          <img class="item-preview" id="preview-${id}" style="display:none;max-height:120px;margin-top:8px;border-radius:var(--radius-sm);">
        </div>`;
            document.getElementById('itemList').appendChild(div);
            items.push({ id, title: '', desc: '', dataUrl: null, w: 0, h: 0 });
        }

        function previewItemImage(input, id) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const item = items.find(i => i.id === id);
                    if (item) { item.dataUrl = e.target.result; item.w = img.width; item.h = img.height; }
                    const preview = document.getElementById('preview-' + id);
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function generatePortfolio() {
            // Gather data
            const name = document.getElementById('pName').value || 'Portfolio';
            const tagline = document.getElementById('pTagline').value || '';
            const email = document.getElementById('pEmail').value || '';
            const link = document.getElementById('pLink').value || '';
            const intro = document.getElementById('pIntro').value || '';
            const accentHex = document.getElementById('pAccent').value;
            const layout = document.getElementById('pLayout').value;

            // Sync item titles/descs
            document.querySelectorAll('#itemList > div').forEach((div, i) => {
                if (items[i]) {
                    items[i].title = div.querySelector('.item-title')?.value || '';
                    items[i].desc = div.querySelector('.item-desc')?.value || '';
                }
            });
            const validItems = items.filter(it => it.dataUrl || it.title);
            if (!validItems.length) return showToast('Add at least one portfolio item.', 'error');

            const pb = document.getElementById('progressBar'), pf = document.getElementById('progressFill');
            pb.classList.add('active'); pf.style.width = '5%';

            const ar = parseInt(accentHex.slice(1, 3), 16);
            const ag = parseInt(accentHex.slice(3, 5), 16);
            const ab = parseInt(accentHex.slice(5, 7), 16);

            const pdf = new jsPDF('p', 'mm', 'a4');
            const W = 210, H = 297;

            // Cover page
            pdf.setFillColor(ar, ag, ab);
            pdf.rect(0, 0, W, H, 'F');
            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(36);
            pdf.setFont('helvetica', 'bold');
            pdf.text(name, W / 2, H / 2 - 20, { align: 'center' });
            pdf.setFontSize(16);
            pdf.setFont('helvetica', 'normal');
            if (tagline) pdf.text(tagline, W / 2, H / 2, { align: 'center' });
            pdf.setFontSize(10);
            const contactStr = [email, link].filter(Boolean).join(' · ');
            if (contactStr) pdf.text(contactStr, W / 2, H / 2 + 14, { align: 'center' });

            pf.style.width = '15%';

            // Intro page
            if (intro) {
                pdf.addPage();
                pdf.setTextColor(ar, ag, ab);
                pdf.setFontSize(20);
                pdf.setFont('helvetica', 'bold');
                pdf.text('About Me', 20, 30);
                pdf.setDrawColor(ar, ag, ab);
                pdf.setLineWidth(0.5);
                pdf.line(20, 33, W - 20, 33);
                pdf.setTextColor(60, 60, 60);
                pdf.setFontSize(11);
                pdf.setFont('helvetica', 'normal');
                const introLines = pdf.splitTextToSize(intro, W - 40);
                pdf.text(introLines, 20, 42);
            }
            pf.style.width = '25%';

            // Portfolio items
            for (let i = 0; i < validItems.length; i++) {
                const item = validItems[i];
                pdf.addPage();
                let y = 20;
                // Title
                pdf.setTextColor(ar, ag, ab);
                pdf.setFontSize(18);
                pdf.setFont('helvetica', 'bold');
                pdf.text(item.title || `Project ${i + 1}`, 20, y);
                y += 4;
                pdf.setDrawColor(ar, ag, ab);
                pdf.line(20, y, W - 20, y);
                y += 8;

                // Description
                if (item.desc) {
                    pdf.setTextColor(60, 60, 60);
                    pdf.setFontSize(10);
                    pdf.setFont('helvetica', 'normal');
                    const dl = pdf.splitTextToSize(item.desc, W - 40);
                    pdf.text(dl, 20, y);
                    y += dl.length * 5 + 6;
                }

                // Image
                if (item.dataUrl) {
                    const maxW = W - 40;
                    const maxH = H - y - 20;
                    const ratio = Math.min(maxW / item.w, maxH / item.h, 1);
                    const iw = item.w * ratio;
                    const ih = item.h * ratio;
                    const x = (W - iw) / 2;
                    const imgType = item.dataUrl.includes('image/png') ? 'PNG' : 'JPEG';
                    pdf.addImage(item.dataUrl, imgType, x, y, iw, ih);
                }
                pf.style.width = (25 + (i + 1) / validItems.length * 70) + '%';
                await new Promise(r => setTimeout(r, 30));
            }

            pf.style.width = '100%';
            const blob = pdf.output('blob');
            document.getElementById('resultInfo').textContent = `${validItems.length + 2} pages · ${formatBytes(blob.size)}`;
            document.getElementById('resultArea').classList.add('show');
            document.getElementById('downloadBtn').onclick = () => {
                downloadBlob(blob, `${name.replace(/\s+/g, '_')}_Portfolio.pdf`);
                FreePDFStats.record('Portfolio Generator');
            };
            showToast('Portfolio PDF generated!', 'success');
            setTimeout(() => pb.classList.remove('active'), 400);
        }
    </script>
</body>
