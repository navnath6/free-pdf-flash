    }

<body>
    <div class="splash-screen">
        <div class="splash-logo"><i class="fas fa-file-pdf"></i></div>
        <div class="splash-bar">
            <div class="splash-bar-inner"></div>
        </div>
    </div>
    <header class="header">
        <div class="container"><a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-file-pdf"></i></div>Free PDF <span>Flash</span>
            </a>
            <nav class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a
                    href="contact.html">Contact</a><a href="index.html#tools">Tools</a></nav>
            <div style="display:flex;align-items:center;gap:8px;"><button
                    class="menu-btn"><span></span><span></span><span></span></button></div>
        </div>
    </header>
    <nav class="mobile-nav"><a href="index.html"><i class="fas fa-home"></i>Home</a><a href="about.html"><i
                class="fas fa-info-circle"></i>About</a></nav>

    <main class="tool-page">
        <div class="container">
            <div class="tool-hero">
                <h1><i class="fas fa-id-badge" style="color:var(--primary);"></i> Resume Builder</h1>
                <p>Fill in your details and generate a professional PDF resume instantly.</p>
            </div>
            <div class="tool-workspace">
                <h3 style="margin-bottom:16px;font-size:1rem;">Personal Information</h3>
                <div class="form-grid">
                    <div class="form-group"><label>Full Name</label><input type="text" id="rName"
                            placeholder="John Doe"></div>
                    <div class="form-group"><label>Job Title</label><input type="text" id="rTitle"
                            placeholder="Frontend Developer"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="rEmail"
                            placeholder="john@example.com"></div>
                    <div class="form-group"><label>Phone</label><input type="text" id="rPhone"
                            placeholder="+1 234 567 8901"></div>
                    <div class="form-group"><label>Location</label><input type="text" id="rLocation"
                            placeholder="New York, NY"></div>
                    <div class="form-group"><label>LinkedIn / Website</label><input type="text" id="rLink"
                            placeholder="linkedin.com/in/johndoe"></div>
                </div>

                <h3 style="margin:24px 0 16px;font-size:1rem;">Professional Summary</h3>
                <div class="form-group"><textarea id="rSummary" rows="3"
                        placeholder="Brief professional summary..."></textarea></div>

                <h3 style="margin:24px 0 16px;font-size:1rem;">Work Experience</h3>
                <div id="expList"></div>
                <button class="btn btn-outline btn-sm" onclick="addExp()" style="margin-top:8px;"><i
                        class="fas fa-plus"></i> Add Experience</button>

                <h3 style="margin:24px 0 16px;font-size:1rem;">Education</h3>
                <div id="eduList"></div>
                <button class="btn btn-outline btn-sm" onclick="addEdu()" style="margin-top:8px;"><i
                        class="fas fa-plus"></i> Add Education</button>

                <h3 style="margin:24px 0 16px;font-size:1rem;">Skills</h3>
                <div class="form-group"><input type="text" id="rSkills"
                        placeholder="JavaScript, React, Node.js, Python (comma-separated)"></div>

                <div class="settings-panel" style="margin-top:24px;">
                    <div class="setting-group">
                        <label for="rTemplate">Template Style</label>
                        <select id="rTemplate">
                            <option value="modern">Modern</option>
                            <option value="classic">Classic</option>
                            <option value="minimal">Minimal</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label for="rColor">Accent Color</label>
                        <select id="rColor">
                            <option value="#2B7A4B">Red</option>
                            <option value="#1565C0">Blue</option>
                            <option value="#2E7D32">Green</option>
                            <option value="#424242">Dark Gray</option>
                        </select>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn btn-outline btn-sm" onclick="saveResume()"><i class="fas fa-save"></i> Save
                        Draft</button>
                    <button class="btn btn-primary" onclick="generateResume()"><i class="fas fa-file-pdf"></i> Generate
                        PDF</button>
                </div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="result-area" id="resultArea">
                    <i class="fas fa-check-circle"></i>
                    <h3>Resume PDF Ready!</h3>
                    <p id="resultInfo"></p>
                    <button class="btn btn-primary" id="downloadBtn"><i class="fas fa-download"></i> Download
                        Resume</button>
                </div>
            </div>
            <div class="ad-banner">📢 Ad Space — Place your banner ad here</div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">&copy; 2026 Free PDF Flash.</div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
    <script>
        const { jsPDF } = window.jspdf;
        let expCount = 0, eduCount = 0;

        // Auto-load saved draft
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('fpdf-resume-draft');
            if (saved) {
                try {
                    const d = JSON.parse(saved);
                    if (d.name) document.getElementById('rName').value = d.name;
                    if (d.title) document.getElementById('rTitle').value = d.title;
                    if (d.email) document.getElementById('rEmail').value = d.email;
                    if (d.phone) document.getElementById('rPhone').value = d.phone;
                    if (d.location) document.getElementById('rLocation').value = d.location;
                    if (d.link) document.getElementById('rLink').value = d.link;
                    if (d.summary) document.getElementById('rSummary').value = d.summary;
                    if (d.skills) document.getElementById('rSkills').value = d.skills;
                } catch (e) { }
            }
            addExp(); addEdu();
        });

        function addExp() {
            const id = expCount++;
            const div = document.createElement('div');
            div.className = 'form-grid';
            div.style.marginBottom = '12px';
            div.style.padding = '16px';
            div.style.background = 'var(--bg-surface)';
            div.style.borderRadius = 'var(--radius-md)';
            div.innerHTML = `
        <div class="form-group"><label>Job Title</label><input type="text" class="exp-title" placeholder="Software Engineer"></div>
        <div class="form-group"><label>Company</label><input type="text" class="exp-company" placeholder="Google"></div>
        <div class="form-group"><label>Duration</label><input type="text" class="exp-duration" placeholder="2020 - Present"></div>
        <div class="form-group"><label>Description</label><textarea class="exp-desc" rows="2" placeholder="Key responsibilities and achievements..."></textarea></div>`;
            document.getElementById('expList').appendChild(div);
        }

        function addEdu() {
            const div = document.createElement('div');
            div.className = 'form-grid';
            div.style.marginBottom = '12px';
            div.style.padding = '16px';
            div.style.background = 'var(--bg-surface)';
            div.style.borderRadius = 'var(--radius-md)';
            div.innerHTML = `
        <div class="form-group"><label>Degree</label><input type="text" class="edu-degree" placeholder="B.Sc. Computer Science"></div>
        <div class="form-group"><label>Institution</label><input type="text" class="edu-school" placeholder="MIT"></div>
        <div class="form-group"><label>Year</label><input type="text" class="edu-year" placeholder="2016 - 2020"></div>`;
            document.getElementById('eduList').appendChild(div);
        }

        function saveResume() {
            const data = {
                name: document.getElementById('rName').value,
                title: document.getElementById('rTitle').value,
                email: document.getElementById('rEmail').value,
                phone: document.getElementById('rPhone').value,
                location: document.getElementById('rLocation').value,
                link: document.getElementById('rLink').value,
                summary: document.getElementById('rSummary').value,
                skills: document.getElementById('rSkills').value
            };
            localStorage.setItem('fpdf-resume-draft', JSON.stringify(data));
            showToast('Draft saved!', 'success');
        }

        function generateResume() {
            const name = document.getElementById('rName').value || 'Your Name';
            const title = document.getElementById('rTitle').value || '';
            const email = document.getElementById('rEmail').value || '';
            const phone = document.getElementById('rPhone').value || '';
            const location = document.getElementById('rLocation').value || '';
            const link = document.getElementById('rLink').value || '';
            const summary = document.getElementById('rSummary').value || '';
            const skills = document.getElementById('rSkills').value || '';
            const accentHex = document.getElementById('rColor').value;

            const pb = document.getElementById('progressBar'), pf = document.getElementById('progressFill');
            pb.classList.add('active'); pf.style.width = '20%';

            // Parse accent color
            const r = parseInt(accentHex.slice(1, 3), 16) / 255;
            const g = parseInt(accentHex.slice(3, 5), 16) / 255;
            const b = parseInt(accentHex.slice(5, 7), 16) / 255;

            const pdf = new jsPDF('p', 'mm', 'a4');
            const W = 210, H = 297;
            let y = 0;

            // Header bar
            pdf.setFillColor(r * 255, g * 255, b * 255);
            pdf.rect(0, 0, W, 42, 'F');
            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(24);
            pdf.setFont('helvetica', 'bold');
            pdf.text(name, 15, 20);
            pdf.setFontSize(12);
            pdf.setFont('helvetica', 'normal');
            if (title) pdf.text(title, 15, 30);
            // Contact info right side
            pdf.setFontSize(9);
            const contactLines = [email, phone, location, link].filter(Boolean);
            contactLines.forEach((line, i) => {
                pdf.text(line, W - 15, 14 + i * 6, { align: 'right' });
            });

            y = 52;
            pdf.setTextColor(40, 40, 40);

            // Summary
            if (summary) {
                pdf.setFontSize(12);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(r * 255, g * 255, b * 255);
                pdf.text('PROFESSIONAL SUMMARY', 15, y);
                y += 2;
                pdf.setDrawColor(r * 255, g * 255, b * 255);
                pdf.setLineWidth(0.5);
                pdf.line(15, y, W - 15, y);
                y += 6;
                pdf.setFont('helvetica', 'normal');
                pdf.setFontSize(10);
                pdf.setTextColor(60, 60, 60);
                const lines = pdf.splitTextToSize(summary, W - 30);
                pdf.text(lines, 15, y);
                y += lines.length * 5 + 8;
            }
            pf.style.width = '40%';

            // Experience
            const expTitles = document.querySelectorAll('.exp-title');
            if (expTitles.length) {
                pdf.setFontSize(12);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(r * 255, g * 255, b * 255);
                pdf.text('WORK EXPERIENCE', 15, y);
                y += 2;
                pdf.line(15, y, W - 15, y);
                y += 6;
                expTitles.forEach((el, i) => {
                    const t = el.value;
                    const c = document.querySelectorAll('.exp-company')[i]?.value || '';
                    const dur = document.querySelectorAll('.exp-duration')[i]?.value || '';
                    const desc = document.querySelectorAll('.exp-desc')[i]?.value || '';
                    if (!t && !c) return;
                    if (y > 270) { pdf.addPage(); y = 15; }
                    pdf.setFont('helvetica', 'bold');
                    pdf.setFontSize(11);
                    pdf.setTextColor(40, 40, 40);
                    pdf.text(t || 'Position', 15, y);
                    pdf.setFont('helvetica', 'normal');
                    pdf.setFontSize(9);
                    pdf.setTextColor(120, 120, 120);
                    pdf.text(`${c}${dur ? ' | ' + dur : ''}`, 15, y + 5);
                    y += 11;
                    if (desc) {
                        pdf.setFontSize(10);
                        pdf.setTextColor(60, 60, 60);
                        const dl = pdf.splitTextToSize(desc, W - 30);
                        pdf.text(dl, 15, y);
                        y += dl.length * 5 + 4;
                    }
                    y += 2;
                });
                y += 4;
            }
            pf.style.width = '60%';

            // Education
            const eduDegrees = document.querySelectorAll('.edu-degree');
            if (eduDegrees.length) {
                if (y > 260) { pdf.addPage(); y = 15; }
                pdf.setFontSize(12);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(r * 255, g * 255, b * 255);
                pdf.text('EDUCATION', 15, y);
                y += 2;
                pdf.line(15, y, W - 15, y);
                y += 6;
                eduDegrees.forEach((el, i) => {
                    const deg = el.value;
                    const sch = document.querySelectorAll('.edu-school')[i]?.value || '';
                    const yr = document.querySelectorAll('.edu-year')[i]?.value || '';
                    if (!deg && !sch) return;
                    pdf.setFont('helvetica', 'bold');
                    pdf.setFontSize(11);
                    pdf.setTextColor(40, 40, 40);
                    pdf.text(deg || 'Degree', 15, y);
                    pdf.setFont('helvetica', 'normal');
                    pdf.setFontSize(9);
                    pdf.setTextColor(120, 120, 120);
                    pdf.text(`${sch}${yr ? ' | ' + yr : ''}`, 15, y + 5);
                    y += 12;
                });
                y += 4;
            }
            pf.style.width = '80%';

            // Skills
            if (skills) {
                if (y > 260) { pdf.addPage(); y = 15; }
                pdf.setFontSize(12);
                pdf.setFont('helvetica', 'bold');
                pdf.setTextColor(r * 255, g * 255, b * 255);
                pdf.text('SKILLS', 15, y);
                y += 2;
                pdf.line(15, y, W - 15, y);
                y += 6;
                pdf.setFont('helvetica', 'normal');
                pdf.setFontSize(10);
                pdf.setTextColor(60, 60, 60);
                const skillLines = pdf.splitTextToSize(skills, W - 30);
                pdf.text(skillLines, 15, y);
            }

            pf.style.width = '100%';

            const blob = pdf.output('blob');
            document.getElementById('resultInfo').textContent = `Resume ready · ${formatBytes(blob.size)}`;
            document.getElementById('resultArea').classList.add('show');
            document.getElementById('downloadBtn').onclick = () => {
                downloadBlob(blob, `${name.replace(/\s+/g, '_')}_Resume.pdf`);
                FreePDFStats.record('Resume Builder');
            };
            showToast('Resume PDF generated!', 'success');
            setTimeout(() => pb.classList.remove('active'), 400);
        }
    </script>
</body>
