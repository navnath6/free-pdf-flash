    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="app.js"></script>
    <script>
        let srcPdfBytes = null;
        let totalPages = 0;
        initDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), handleFile);

        function handleFile(fl) {
            const f = fl[0];
            if (!f) return;
            const reader = new FileReader();
            reader.onload = async e => {
                srcPdfBytes = new Uint8Array(e.target.result);
                try {
                    const pdf = await PDFLib.PDFDocument.load(srcPdfBytes);
                    totalPages = pdf.getPageCount();
                    document.getElementById('pdfName').textContent = f.name;
                    document.getElementById('pdfPages').textContent = totalPages + ' pages';
                    document.getElementById('pdfInfo').style.display = 'block';
                    document.getElementById('actionBar').style.display = 'flex';
                    document.getElementById('pageRange').placeholder = `1-${totalPages}`;
                } catch (err) { showToast('Invalid PDF: ' + err.message, 'error'); }
            };
            reader.readAsArrayBuffer(f);
        }

        function toggleMode() {
            const mode = document.getElementById('splitMode').value;
            document.getElementById('rangeGroup').style.display = mode === 'every' ? 'none' : 'block';
            document.getElementById('everyGroup').style.display = mode === 'every' ? 'block' : 'none';
        }

        function parseRange(str, max) {
            const pages = new Set();
            str.split(',').forEach(part => {
                part = part.trim();
                if (part.includes('-')) {
                    const [a, b] = part.split('-').map(Number);
                    for (let i = Math.max(1, a); i <= Math.min(max, b); i++) pages.add(i - 1);
                } else {
                    const n = parseInt(part);
                    if (n >= 1 && n <= max) pages.add(n - 1);
                }
            });
            return Array.from(pages).sort((a, b) => a - b);
        }

        async function splitPDF() {
            if (!srcPdfBytes) return;
            const mode = document.getElementById('splitMode').value;
            const pb = document.getElementById('progressBar'), pf = document.getElementById('progressFill');
            pb.classList.add('active'); pf.style.width = '0%';
            const links = document.getElementById('downloadLinks');
            links.innerHTML = '';
            try {
                const srcPdf = await PDFLib.PDFDocument.load(srcPdfBytes);
                const blobs = [];

                if (mode === 'every') {
                    const n = parseInt(document.getElementById('everyN').value) || 1;
                    for (let i = 0; i < totalPages; i += n) {
                        const newPdf = await PDFLib.PDFDocument.create();
                        const indices = [];
                        for (let j = i; j < Math.min(i + n, totalPages); j++) indices.push(j);
                        const pages = await newPdf.copyPages(srcPdf, indices);
                        pages.forEach(p => newPdf.addPage(p));
                        const bytes = await newPdf.save();
                        blobs.push({ blob: new Blob([bytes], { type: 'application/pdf' }), name: `split-${Math.floor(i / n) + 1}.pdf` });
                        pf.style.width = ((i + n) / totalPages * 100) + '%';
                    }
                } else {
                    const rangeStr = document.getElementById('pageRange').value;
                    if (!rangeStr) return showToast('Enter page range.', 'error');
                    const indices = parseRange(rangeStr, totalPages);
                    if (!indices.length) return showToast('Invalid range.', 'error');

                    if (mode === 'single') {
                        for (let i = 0; i < indices.length; i++) {
                            const newPdf = await PDFLib.PDFDocument.create();
                            const [p] = await newPdf.copyPages(srcPdf, [indices[i]]);
                            newPdf.addPage(p);
                            const bytes = await newPdf.save();
                            blobs.push({ blob: new Blob([bytes], { type: 'application/pdf' }), name: `page-${indices[i] + 1}.pdf` });
                            pf.style.width = ((i + 1) / indices.length * 100) + '%';
                        }
                    } else {
                        const newPdf = await PDFLib.PDFDocument.create();
                        const pages = await newPdf.copyPages(srcPdf, indices);
                        pages.forEach(p => newPdf.addPage(p));
                        const bytes = await newPdf.save();
                        blobs.push({ blob: new Blob([bytes], { type: 'application/pdf' }), name: 'extracted-pages.pdf' });
                        pf.style.width = '100%';
                    }
                }

                blobs.forEach(b => {
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-outline btn-sm';
                    btn.style.margin = '4px';
                    btn.innerHTML = `<i class="fas fa-download"></i> ${b.name}`;
                    btn.onclick = () => { downloadBlob(b.blob, b.name); FreePDFStats.record('Split PDF'); };
                    links.appendChild(btn);
                });
                document.getElementById('resultInfo').textContent = `${blobs.length} file(s) created`;
                document.getElementById('resultArea').classList.add('show');
                showToast('PDF split complete!', 'success');
            } catch (err) { showToast('Error: ' + err.message, 'error'); }
            setTimeout(() => pb.classList.remove('active'), 400);
        }
    </script>
