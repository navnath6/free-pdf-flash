    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="app.js"></script>
    <script>
        let srcBytes = null, fileName = '';
        document.getElementById('wmOpacity').addEventListener('input', function () {
            document.getElementById('wmOpacityVal').textContent = Math.round(this.value * 100) + '%';
        });
        initDropZone(document.getElementById('dropZone'), document.getElementById('fileInput'), handleFile);

        function handleFile(fl) {
            const f = fl[0]; if (!f) return;
            fileName = f.name;
            const reader = new FileReader();
            reader.onload = async e => {
                srcBytes = new Uint8Array(e.target.result);
                try {
                    const pdf = await PDFLib.PDFDocument.load(srcBytes);
                    document.getElementById('fName').textContent = f.name;
                    document.getElementById('fPages').textContent = pdf.getPageCount() + ' pages';
                    document.getElementById('fileInfo').style.display = 'block';
                    document.getElementById('actionBar').style.display = 'flex';
                } catch (err) { showToast('Invalid PDF', 'error'); }
            };
            reader.readAsArrayBuffer(f);
        }

        async function addWatermark() {
            if (!srcBytes) return;
            const text = document.getElementById('wmText').value || 'WATERMARK';
            const fontSize = parseInt(document.getElementById('wmSize').value) || 50;
            const opacity = parseFloat(document.getElementById('wmOpacity').value) || 0.15;
            const rotation = parseInt(document.getElementById('wmRotation').value) || -45;
            const colorName = document.getElementById('wmColor').value;

            const pb = document.getElementById('progressBar'), pf = document.getElementById('progressFill');
            pb.classList.add('active'); pf.style.width = '10%';

            try {
                const pdf = await PDFLib.PDFDocument.load(srcBytes);
                const font = await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
                const colors = { red: PDFLib.rgb(1, 0, 0), gray: PDFLib.rgb(0.5, 0.5, 0.5), blue: PDFLib.rgb(0, 0, 1), black: PDFLib.rgb(0, 0, 0) };
                const color = colors[colorName] || colors.gray;
                const pages = pdf.getPages();

                for (let i = 0; i < pages.length; i++) {
                    const page = pages[i];
                    const { width, height } = page.getSize();
                    const textWidth = font.widthOfTextAtSize(text, fontSize);
                    const x = (width - textWidth * Math.cos(Math.abs(rotation) * Math.PI / 180)) / 2;
                    const y = height / 2;

                    page.drawText(text, {
                        x, y, size: fontSize, font, color, opacity,
                        rotate: PDFLib.degrees(rotation)
                    });
                    pf.style.width = ((i + 1) / pages.length * 90 + 10) + '%';
                }

                const wmBytes = await pdf.save();
                const blob = new Blob([wmBytes], { type: 'application/pdf' });
                document.getElementById('resultInfo').textContent = `${pages.length} pages watermarked · ${formatBytes(blob.size)}`;
                document.getElementById('resultArea').classList.add('show');
                document.getElementById('downloadBtn').onclick = () => {
                    downloadBlob(blob, 'watermarked-' + fileName);
                    FreePDFStats.record('Watermark PDF');
                };
                showToast('Watermark added!', 'success');
            } catch (err) { showToast('Error: ' + err.message, 'error'); }
            setTimeout(() => pb.classList.remove('active'), 400);
        }
    </script>
